<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 48" fill="white">
  <!-- T Letter -->
  <rect x="0"  y="0"  width="36" height="12"/>
  <rect x="13" y="12" width="10" height="36"/>

  <!-- A Letter: left leg, right leg, crossbar -->
  <polygon points="41,48 53,48 61,4 49,4"/>
  <polygon points="65,4 77,4 85,48 73,48"/>
  <!-- Crossbar (fills gap between inner legs) -->
  <polygon points="54,30 72,30 70,39 56,39"/>

  <!-- Notch accent square — top-right corner, like in original TA logo -->
  <rect x="97" y="0" width="11" height="11"/>
</svg>
